<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Populate Dropdown</title>
</head>
<body>
 <select class="dropdown"></select>


  <script>
    const fruits = [
"Apple",
"Banana",
"Mango",
"Orange"
];
const opt=document.querySelector('.dropdown');
fruits.forEach((fruit)=>{
  const elm=document.createElement('option');
  elm.textContent=fruit;
  elm.value=fruit.toLocaleLowerCase();
  opt.appendChild(elm)
})
  
  </script>
</body>
</html>
